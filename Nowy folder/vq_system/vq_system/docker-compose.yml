version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${DB_USER:-vq}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-vq}
      POSTGRES_DB: ${DB_NAME:-vq_db}
    ports:
      - "5432:5432"
    volumes:
      - vq_pgdata:/var/lib/postgresql/data

  app:
    build: .
    env_file:
      - .env
    depends_on:
      - db
    ports:
      - "8000:8000"
    volumes:
      - .:/app

volumes:
  vq_pgdata:
